<div class="min-h-screen bg-slate-950 flex items-center justify-center p-4 font-sans selection:bg-emerald-500 selection:text-white">
    <!-- Back to home -->
    <div class="absolute top-6 left-6">
        <a routerLink="/" class="text-slate-400 hover:text-slate-200 text-sm font-medium transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Volver a la Portada
        </a>
    </div>

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-8 space-y-6">
        <div class="text-center space-y-2">
            <span class="text-xs font-semibold text-emerald-400 uppercase tracking-widest bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">
                Acceso Administrativo
            </span>
            <h1 class="text-2xl font-bold text-slate-100 tracking-tight font-serif pt-2">
                El Diario Inesperado
            </h1>
            <p class="text-xs text-slate-400">Introduce tus credenciales para ingresar al Panel</p>
        </div>

        <form (ngSubmit)="onSubmit()" class="space-y-4">
            @if (errorMessage) {
                <div class="bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs py-3 px-4 rounded-lg flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <span>{{ errorMessage }}</span>
                </div>
            }

            <div class="space-y-1">
                <label class="block text-xs font-medium text-slate-300">Correo Electrónico</label>
                <input type="email"
                    [(ngModel)]="email"
                    name="email"
                    required
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all text-sm"
                    placeholder="admin@diario.com">
            </div>

            <div class="space-y-1">
                <label class="block text-xs font-medium text-slate-300">Contraseña</label>
                <input type="password"
                    [(ngModel)]="password"
                    name="password"
                    required
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all text-sm"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                [disabled]="isLoading"
                class="w-full bg-emerald-700 hover:bg-emerald-600 text-white font-semibold py-3 px-4 rounded-lg shadow-lg shadow-emerald-900/20 transition-all cursor-pointer flex justify-center items-center gap-2 mt-6 disabled:opacity-50 disabled:cursor-not-allowed">
                @if (isLoading) {
                    <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Ingresando...</span>
                } @else {
                    <span>Ingresar</span>
                }
            </button>
        </form>
    </div>
</div>
